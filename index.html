<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finance Tracker</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <h1>Finance Tracker</h1>

    <div class="summary-cards">
        <div class="card income-card">
            <span class="card-label">Total Income</span>
            <span class="card-amount" id="total-income">₱0.00</span>
        </div>
        <div class="card expense-card">
            <span class="card-label">Total Expenses</span>
            <span class="card-amount" id="total-expenses">₱0.00</span>
        </div>
         <div class="card balance-card">
            <span class="card-label">Net Balance</span>
            <span class="card-amount" id="balance">₱0.00</span>
        </div>
    </div>

    <form id="transaction-form">
        <input type="text" id="desc" placeholder="Description" required>
        <input type="number" id="amount" placeholder="Amount" required>
        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>
         <select id="category">
            <option value="Savings">💵 Savings</option>
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Bills">💡 Bills</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Health">🏥 Health</option>
            <option value="Salary">💼 Salary</option>
            <option value="Other">📦 Other</option>
        </select>
        <input type="date" id="date" required>
        <button type="submit">Add</button>
    </form>


    <ul id="transaction-list"></ul>

    <script src="assets/js/app.js"></script>
</body>
</html>
